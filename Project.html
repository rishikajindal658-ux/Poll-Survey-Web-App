<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Poll Survey App</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}
body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    padding:20px;
}
.container{
    width:100%;
    max-width:550px;
    min-height:500px;
    padding:30px;
    border-radius:25px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    box-shadow:0 8px 32px rgba(0,0,0,0.25);
    color:white;
    position:relative;
    overflow:hidden;
}
.page{
    display:none;
    animation:fade 0.5s ease;
}
.page.active{
    display:block;
}
@keyframes fade{
    from{opacity:0; transform:translateX(30px);}
    to{opacity:1; transform:translateX(0);}
}
input,button{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:12px;
}
button{
    background:linear-gradient(90deg,#ff512f,#dd2476);
    color:white;
    font-weight:bold;
    cursor:pointer;
}
.option{
    padding:15px;
    margin:10px 0;
    border-radius:12px;
    background:rgba(255,255,255,0.2);
    cursor:pointer;
    transition:0.3s;
}
.option:hover{
    transform:scale(1.02);
}
.selected{
    border:2px solid lime;
}
.card{
    padding:15px;
    margin:15px 0;
    border-radius:15px;
    background:rgba(255,255,255,0.15);
}
</style>
</head>
<body>

<div class="container">

    <!-- Home Page -->
    <div id="homePage" class="page active">
        <h1>🏠 Welcome</h1>
        <p style="margin:15px 0;">Welcome to Premium Poll Survey App</p>
        <button onclick="showPage('authPage')">Continue</button>
    </div>

    <!-- Auth Page -->
    <div id="authPage" class="page">
        <h1>🔐 Login / Register</h1>
        <input type="text" id="username" placeholder="Enter username">
        <input type="password" id="password" placeholder="Enter password">
        <button onclick="register()">Register</button>
        <button onclick="login()">Login</button>
    </div>

    <!-- Vote Page -->
    <div id="votePage" class="page">
        <h1>🗳 Vote Your Choice</h1>

        <div class="option" onclick="selectVote(0)">AI</div>
        <div class="option" onclick="selectVote(1)">Web Development</div>
        <div class="option" onclick="selectVote(2)">Cyber Security</div>
        <div class="option" onclick="selectVote(3)">Data Science</div>

        <button onclick="submitVote()">Submit Vote</button>
    </div>

    <!-- Dashboard Page -->
    <div id="dashboardPage" class="page">
        <h1>📊 Dashboard</h1>

        <div class="card">
            <p id="totalUsers"></p>
            <p id="totalVotes"></p>
            <p id="winner"></p>
        </div>

        <div class="card" id="results"></div>

        <button onclick="showPage('homePage')">🏠 Home</button>
        <button onclick="logout()">🔓 Logout</button>
    </div>

</div>

<script>
let users = JSON.parse(localStorage.getItem("users")) || [];
let votes = JSON.parse(localStorage.getItem("votes")) || [0,0,0,0];
let selected = -1;
let labels = ["AI","Web Development","Cyber Security","Data Science"];

function showPage(pageId){
    document.querySelectorAll(".page")
    .forEach(page=>page.classList.remove("active"));

    document.getElementById(pageId).classList.add("active");
}

function register(){
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if(!username || !password){
        alert("Please fill all fields");
        return;
    }

    users.push({username,password});
    localStorage.setItem("users", JSON.stringify(users));

    alert("🎉 Registered successfully");
}

function login(){
    showPage("votePage");
}

function selectVote(index){
    selected = index;

    document.querySelectorAll(".option")
    .forEach(x=>x.classList.remove("selected"));

    document.querySelectorAll(".option")[index]
    .classList.add("selected");
}

function submitVote(){
    if(selected===-1){
        alert("Please select an option");
        return;
    }

    votes[selected]++;
    localStorage.setItem("votes", JSON.stringify(votes));

    loadDashboard();
    showPage("dashboardPage");
}

function loadDashboard(){
    let total = votes.reduce((a,b)=>a+b,0);
    let maxVote = Math.max(...votes);
    let winnerIndex = votes.indexOf(maxVote);

    document.getElementById("totalUsers").innerText =
        "👥 Total Users: " + users.length;

    document.getElementById("totalVotes").innerText =
        "🗳 Total Votes: " + total;

    document.getElementById("winner").innerText =
        "🏆 Winner: " + labels[winnerIndex];

    let html = "";
    votes.forEach((vote,index)=>{
        let percent = total ? ((vote/total)*100).toFixed(1) : 0;
        html += `<p>${labels[index]} - ${percent}%</p>`;
    });

    document.getElementById("results").innerHTML = html;
}

function logout(){
    showPage("homePage");
}
</script>

</body>
</html>
